<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Primi Piatti Admin</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/admin.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="admin-layout">
    <!-- Sidebar Overlay (mobile) -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <a href="../index.html" class="sidebar-logo">Primi Piatti</a>
        <span class="sidebar-subtitle">Painel Administrativo</span>
      </div>
      
      <nav class="sidebar-nav">
        <span class="nav-section-title">Menu</span>
        
        <a href="index.html" class="nav-link active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"></rect>
            <rect x="14" y="3" width="7" height="7"></rect>
            <rect x="14" y="14" width="7" height="7"></rect>
            <rect x="3" y="14" width="7" height="7"></rect>
          </svg>
          Dashboard
        </a>
        
        <a href="orders.html" class="nav-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"></path>
            <rect x="9" y="3" width="6" height="4" rx="1"></rect>
          </svg>
          Pedidos
        </a>
        
        <a href="products.html" class="nav-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <path d="M16 10a4 4 0 0 1-8 0"></path>
          </svg>
          Produtos
        </a>
      </nav>
      
      <div class="sidebar-footer">
        <a href="../index.html">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
          Voltar à Loja
        </a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">
      <header class="admin-header">
        <button class="mobile-menu-btn" onclick="toggleSidebar()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
        <h1 class="admin-title">Dashboard</h1>
        <div></div>
      </header>

      <div class="admin-content">
        <!-- Stats Grid -->
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">Total de Pedidos</div>
            <div class="stat-value" id="totalOrders">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Total em Vendas</div>
            <div class="stat-value highlight" id="totalSales">R$ 0,00</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Pedidos Pendentes</div>
            <div class="stat-value" id="pendingOrders">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Em Preparo</div>
            <div class="stat-value" id="preparingOrders">0</div>
          </div>
        </div>

        <!-- Chart -->
        <div class="chart-card">
          <div class="chart-header">
            <h2 class="chart-title">Vendas da Semana</h2>
          </div>
          <div class="chart-container" id="salesChart">
            <canvas id="chartCanvas" height="200"></canvas>
          </div>
        </div>

        <!-- Recent Orders -->
        <div class="recent-orders">
          <div class="section-header">
            <h2 class="section-title">Pedidos Recentes</h2>
            <a href="orders.html" class="view-all-link">Ver todos</a>
          </div>
          
          <table class="orders-table">
            <thead>
              <tr>
                <th>Pedido</th>
                <th>Cliente</th>
                <th>Total</th>
                <th>Status</th>
                <th>Data</th>
              </tr>
            </thead>
            <tbody id="recentOrdersBody">
              <tr>
                <td colspan="5" style="text-align: center; padding: 40px; color: var(--gray-400);">
                  Nenhum pedido ainda
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/data.js"></script>
  <script src="../js/admin.js"></script>
</body>
</html>
