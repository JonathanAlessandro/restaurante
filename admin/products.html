<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produtos - Primi Piatti Admin</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/admin.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="admin-layout">
    <!-- Sidebar Overlay (mobile) -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <a href="../index.html" class="sidebar-logo">Primi Piatti</a>
        <span class="sidebar-subtitle">Painel Administrativo</span>
      </div>
      
      <nav class="sidebar-nav">
        <span class="nav-section-title">Menu</span>
        
        <a href="index.html" class="nav-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"></rect>
            <rect x="14" y="3" width="7" height="7"></rect>
            <rect x="14" y="14" width="7" height="7"></rect>
            <rect x="3" y="14" width="7" height="7"></rect>
          </svg>
          Dashboard
        </a>
        
        <a href="orders.html" class="nav-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"></path>
            <rect x="9" y="3" width="6" height="4" rx="1"></rect>
          </svg>
          Pedidos
        </a>
        
        <a href="products.html" class="nav-link active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <path d="M16 10a4 4 0 0 1-8 0"></path>
          </svg>
          Produtos
        </a>
      </nav>
      
      <div class="sidebar-footer">
        <a href="../index.html">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
          Voltar à Loja
        </a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">
      <header class="admin-header">
        <button class="mobile-menu-btn" onclick="toggleSidebar()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
        <h1 class="admin-title">Produtos</h1>
        <button class="btn-primary" onclick="openProductModal()">+ Novo Produto</button>
      </header>

      <div class="admin-content">
        <!-- Filters -->
        <div class="filters-bar">
          <button class="filter-btn active" data-category="all" onclick="filterProducts('all', this)">Todos</button>
          <button class="filter-btn" data-category="carnes" onclick="filterProducts('carnes', this)">Carnes</button>
          <button class="filter-btn" data-category="frango" onclick="filterProducts('frango', this)">Frango</button>
          <button class="filter-btn" data-category="peixes" onclick="filterProducts('peixes', this)">Peixes</button>
          <button class="filter-btn" data-category="vegetariano" onclick="filterProducts('vegetariano', this)">Vegetariano</button>
          <input type="text" class="search-input" placeholder="Buscar produto..." id="searchProductInput" oninput="searchProducts(this.value)">
        </div>

        <!-- Products Grid -->
        <div class="products-admin-grid" id="productsGrid">
          <!-- Products will be rendered here -->
        </div>
      </div>
    </main>
  </div>

  <!-- Product Modal -->
  <div class="admin-modal-overlay" id="productModal">
    <div class="admin-modal">
      <div class="admin-modal-header">
        <h2 class="admin-modal-title" id="productModalTitle">Novo Produto</h2>
        <button class="action-btn" onclick="closeProductModal()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      
      <div class="admin-modal-body">
        <form id="productForm">
          <input type="hidden" id="productId">
          
          <div class="form-group">
            <label class="form-label">Nome do produto *</label>
            <input type="text" class="form-input" id="productName" required>
          </div>
          
          <div class="form-group">
            <label class="form-label">Descricao</label>
            <textarea class="form-input" id="productDescription" rows="3"></textarea>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Preco *</label>
              <input type="number" class="form-input" id="productPrice" step="0.01" min="0" required>
            </div>
            <div class="form-group">
              <label class="form-label">Preco antigo</label>
              <input type="number" class="form-input" id="productOldPrice" step="0.01" min="0">
            </div>
          </div>
          
          <div class="form-group">
            <label class="form-label">Categoria *</label>
            <select class="form-select" id="productCategory" required>
              <option value="">Selecione...</option>
              <option value="carnes">Carnes</option>
              <option value="frango">Frango</option>
              <option value="peixes">Peixes</option>
              <option value="vegetariano">Vegetariano</option>
            </select>
          </div>
          
          <div class="form-group">
            <label class="form-label">URL da Imagem</label>
            <input type="url" class="form-input" id="productImage" placeholder="https://...">
          </div>
          
          <div class="form-group">
            <label class="checkbox-container">
              <input type="checkbox" id="productSpecial">
              <span class="checkmark"></span>
              Produto em destaque (Especial do dia)
            </label>
          </div>
        </form>
      </div>
      
      <div class="admin-modal-footer">
        <button class="btn-sm btn-edit" onclick="closeProductModal()">Cancelar</button>
        <button class="btn-sm btn-primary" onclick="saveProduct()">Salvar</button>
      </div>
    </div>
  </div>

  <script src="../js/data.js"></script>
  <script src="../js/admin.js"></script>
  <script src="../js/products.js"></script>
</body>
</html>
