<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/home-base.css">
    <link rel="stylesheet" href="css/home-modal.css">
    <link rel="stylesheet" href="css/home-cart.css">
    <link rel="stylesheet" href="css/home-responsive.css">


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&family=Raleway:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Titan+One&display=swap"
        rel="stylesheet">

</head>

<body
    style="margin: 45px; font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;">
    <header class="header">
        <div class="header-content">
            <h1 class="logo"><img src="img/logo.jpg" alt="" width="80px" height="80px"></h1>
            <p class="tagline">Marmitas Pronta-Entrega</p>
        </div>

        <div class="header-actions">

            <!-- Login / Usuário -->
            <button class="user-btn">
                <a href="admin/index.html">   <img src="img/placeholder-user.jpg" alt="Usuário"> </a>
            </button>

            <!-- Carrinho (MOBILE) -->
            <button class="cart-btn mobile-cart" onclick="goToCart()" hidden>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="9" cy="21" r="1"></circle>
                    <circle cx="20" cy="21" r="1"></circle>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2-1.61L23 6H6"></path>
                </svg>
                <span class="cart-count" id="cartCount">0</span>
            </button>

        </div>

    </header>



    <div style="margin-top: 20px;"></div>
    <div id="carouselExampleInterval" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">
            <div class="carousel-item active" data-bs-interval="5000">
                <img src="img/banner1c.png" class="d-block w-100" alt="...">
            </div>
            <div class="carousel-item" data-bs-interval="5000">
                <img src="img/banner2c.png" class="d-block w-100" alt="...">
            </div>
            <div class="carousel-item" data-bs-interval="5000">
                <img src="img/baner3ce.png" class="d-block w-100" alt="...">
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleInterval"
            data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleInterval"
            data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
        </button>
    </div>


    <div class="containerPrincipal" style="position: relative;">



        <div id="produtos-container" class="container2" style="max-width: 80%;justify-content: left;" >


            <div class="menu-categorias">
                <div class="titulo-secao">
                    <h2>Marmitas</h2>
                    <a href="#"></a>
                </div>

                <div class="lista-opcoes">

                    <a href="#" class="item-categoria" data-categoria="">
                        <div class="circulo-imagem">
                            <img src="img/carnes.jpg" alt="Todos">
                        </div>
                        <p>Todos</p>
                    </a>

                    <a href="#" class="item-categoria" data-categoria="carnes">
                        <div class="circulo-imagem">
                            <img src="img/carnes.jpg" alt="Carnes">
                        </div>
                        <p>Carnes</p>
                    </a>
                    
                    <a href="#" class="item-categoria" data-categoria="frangos">
                        <div class="circulo-imagem">
                            <img src="img/marmita_frangos.jpg" alt="Frangos">
                        </div>
                        <p>Frangos</p>
                    </a>
                    
                    <a href="#" class="item-categoria" data-categoria="especiais">
                        <div class="circulo-imagem">
                            <img src="img/parmegiana.jpg" alt="Especiais">
                        </div>
                        <p>Especiais</p>
                    </a>

                    <a href="#" class="item-categoria" data-categoria="super">
                        <div class="circulo-imagem">
                            <img src="img/espcial.jpg" alt="Super Pratos">
                        </div>
                        <p>Super Pratos</p>
                    </a>


                </div>
            </div> 


            
            

            <!-- pagina de menu das marmitas aqui ficam os pedidos cada menu esta separado por uma div lista-opcoes-wrapper -->
            <div id="produtos-secoes"></div>





        </div>
        <!-- fecha aqui a div que está determinando o tamanho para 80% -->
        <!-- Parte da sacola -->

        <!-- SACOLA DESKTOP -->
        <div class="containerSacola sacola-desktop">

            <div class="sacola-header">
                <p>Sacola</p>
                <p id="limpar-sacola" class="clicavel" style="color: rgb(233, 58, 58);">Limpar</p>
            </div>

            <!-- ITENS ÚNICOS -->
            <div class="sacola-itens"></div>

            <p id="total-sacola">Total: R$ 0,00</p>

            <button type="button" class="btn btn-danger btn-finalizar-desktop" data-bs-toggle="modal"
                data-bs-target="#modalLocalizacao">
                Finalizar Pedido
            </button>
        </div>

        <!-- MODAL SACOLA MOBILE -->
        <div class="modal-sacola-mobile" id="modalSacolaMobile">
            <div class="modal-sacola-content">

                <div class="modal-sacola-header">
                    <h3>Sua sacola</h3>

                    <div class="modal-sacola-actions">
                        <span class="limpar-sacola">Limpar</span>
                        <button class="close-modal-sacola" onclick="closeMobileCart()">✕</button>
                    </div>
                </div>

                <div class="modal-sacola-body">
                    <!-- MESMO CONTAINER -->
                    <div class="sacola-itens"></div>
                    <p class="sacola-vazia">Sua sacola está vazia 🛒</p>
                </div>

                <div class="modal-sacola-footer">
                    <button class="btn-finalizar" data-bs-toggle="modal" data-bs-target="#modalLocalizacao">
                        Finalizar Pedido
                    </button>
                </div>

            </div>
        </div>


        <!-- FInaliza aqui a parte da sacola -->

    </div>
    <div id="modais-container">

    </div>

    <div class="modal fade" id="modalLocalizacao" tabindex="-1" aria-hidden="true" style="z-index: 1060 !important;">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Onde entregamos?</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Seu Nome:</label>
                        <input type="text" id="nomeCliente" class="form-control" placeholder="Ex: João Silva">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">WhatsApp / Telefone:</label>
                        <input type="tel" id="telefoneCliente" class="form-control" placeholder="(00) 00000-0000">
                    </div>

                    <hr>
                    <p>Para agilizar, podemos usar sua localização atual:</p>
                    <button type="button" class="btn btn-outline-primary w-100 mb-3" onclick="obterLocalizacao()">
                         Usar minha localização atual
                    </button>

                    <div class="form-group">
                        <label class="form-label">Endereço de Entrega:</label>
                        <input type="text" id="enderecoManual" class="form-control"
                            placeholder="Rua, número, bairro...">
                    </div>

                    <div id="statusLocalizacao" class="small mt-2 text-muted"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                    <button type="button" class="btn btn-danger" onclick="enviarPedido()">Confirmar Endereço</button>
                </div>
            </div>
        </div>
    </div>


    <footer>

    </footer>
    <script src="js/ProductCatalog.js"></script>
    <script src="js/ModalManager.js"></script>
    <script src="js/CartManager.js"></script>
    <script src="js/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
