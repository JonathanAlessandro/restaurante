<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finalizar Pedido - Primi Piatti</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Header -->
  <header class="page-header">
    <button class="back-btn" onclick="window.location.href='cart.html'">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
    </button>
    <h1 class="page-title">Finalizar Pedido</h1>
  </header>

  <!-- Checkout Content -->
  <main class="checkout-container">
    <!-- Customer Info -->
    <section class="checkout-section">
      <h2 class="checkout-section-title">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
        Seus dados
      </h2>
      
      <div class="form-group">
        <label class="form-label">Nome completo *</label>
        <input type="text" class="form-input" id="customerName" placeholder="Digite seu nome" required>
      </div>
      
      <div class="form-group">
        <label class="form-label">Telefone (WhatsApp) *</label>
        <input type="tel" class="form-input" id="customerPhone" placeholder="(00) 00000-0000" required>
      </div>
    </section>

    <!-- Delivery Method -->
    <section class="checkout-section">
      <h2 class="checkout-section-title">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="1" y="3" width="15" height="13"></rect>
          <polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon>
          <circle cx="5.5" cy="18.5" r="2.5"></circle>
          <circle cx="18.5" cy="18.5" r="2.5"></circle>
        </svg>
        Forma de recebimento
      </h2>
      
      <div class="radio-options" id="deliveryOptions">
        <label class="radio-option selected" onclick="selectDelivery('delivery')">
          <input type="radio" name="delivery" value="delivery" checked>
          <span class="radio-circle"></span>
          <span class="radio-label">
            <span class="radio-title">Entrega</span>
            <span class="radio-subtitle">Receba em casa</span>
          </span>
        </label>
        <label class="radio-option" onclick="selectDelivery('pickup')">
          <input type="radio" name="delivery" value="pickup">
          <span class="radio-circle"></span>
          <span class="radio-label">
            <span class="radio-title">Retirada</span>
            <span class="radio-subtitle">Retire no local</span>
          </span>
        </label>
      </div>
    </section>

    <!-- Address Section (for delivery) -->
    <section class="checkout-section" id="addressSection">
      <h2 class="checkout-section-title">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
          <circle cx="12" cy="10" r="3"></circle>
        </svg>
        Endereço de entrega
      </h2>
      
      <div class="form-group">
        <label class="form-label">CEP *</label>
        <input type="text" class="form-input" id="cep" placeholder="00000-000">
      </div>
      
      <div class="form-group">
        <label class="form-label">Rua *</label>
        <input type="text" class="form-input" id="street" placeholder="Nome da rua">
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Número *</label>
          <input type="text" class="form-input" id="number" placeholder="123">
        </div>
        <div class="form-group">
          <label class="form-label">Complemento</label>
          <input type="text" class="form-input" id="complement" placeholder="Apto, Bloco">
        </div>
      </div>
      
      <div class="form-group">
        <label class="form-label">Bairro *</label>
        <input type="text" class="form-input" id="neighborhood" placeholder="Nome do bairro">
      </div>
    </section>

    <!-- Payment Method -->
    <section class="checkout-section">
      <h2 class="checkout-section-title">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
          <line x1="1" y1="10" x2="23" y2="10"></line>
        </svg>
        Forma de pagamento
      </h2>
      
      <div class="radio-options" id="paymentOptions">
        <label class="radio-option selected" onclick="selectPayment('pix')">
          <input type="radio" name="payment" value="pix" checked>
          <span class="radio-circle"></span>
          <span class="radio-label">
            <span class="radio-title">PIX</span>
            <span class="radio-subtitle">Pagamento instantâneo</span>
          </span>
        </label>
        <label class="radio-option" onclick="selectPayment('credit')">
          <input type="radio" name="payment" value="credit">
          <span class="radio-circle"></span>
          <span class="radio-label">
            <span class="radio-title">Cartão de Crédito</span>
            <span class="radio-subtitle">Na máquina</span>
          </span>
        </label>
        <label class="radio-option" onclick="selectPayment('debit')">
          <input type="radio" name="payment" value="debit">
          <span class="radio-circle"></span>
          <span class="radio-label">
            <span class="radio-title">Cartão de Débito</span>
            <span class="radio-subtitle">Na máquina</span>
          </span>
        </label>
        <label class="radio-option" onclick="selectPayment('cash')">
          <input type="radio" name="payment" value="cash">
          <span class="radio-circle"></span>
          <span class="radio-label">
            <span class="radio-title">Dinheiro</span>
            <span class="radio-subtitle">Pagamento na entrega</span>
          </span>
        </label>
        <label class="radio-option" onclick="selectPayment('voucher')">
          <input type="radio" name="payment" value="voucher">
          <span class="radio-circle"></span>
          <span class="radio-label">
            <span class="radio-title">Vale Refeição</span>
            <span class="radio-subtitle">Alelo, VR, Sodexo</span>
          </span>
        </label>
      </div>
      
      <!-- Change section for cash payment -->
      <div class="form-group" id="changeSection" style="display: none; margin-top: 16px;">
        <label class="form-label">Troco para quanto?</label>
        <input type="text" class="form-input" id="changeAmount" placeholder="R$ 50,00">
      </div>
    </section>

    <!-- Order Summary -->
    <section class="checkout-section">
      <h2 class="checkout-section-title">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"></path>
          <rect x="9" y="3" width="6" height="4" rx="1"></rect>
        </svg>
        Resumo do pedido
      </h2>
      
      <div class="order-items" id="orderItems">
        <!-- Items will be rendered here -->
      </div>
      
      <div class="cart-summary" style="margin-top: 16px; box-shadow: none; padding: 0;">
        <div class="summary-row">
          <span>Subtotal</span>
          <span id="subtotal">R$ 0,00</span>
        </div>
        <div class="summary-row">
          <span>Taxa de entrega</span>
          <span id="deliveryFee">R$ 5,00</span>
        </div>
        <div class="summary-row total">
          <span>Total</span>
          <span id="total">R$ 0,00</span>
        </div>
      </div>
    </section>

    <button class="checkout-btn" id="placeOrderBtn" onclick="placeOrder()">
      Confirmar Pedido
    </button>
  </main>

  <script src="../js/data.js"></script>
  <script src="../js/checkout.js"></script>
</body>
</html>
